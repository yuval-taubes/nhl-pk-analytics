name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build .NET solution
        run: dotnet build Data_ingestion.sln --configuration Release

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Lint frontend
        working-directory: Frontend
        run: npm run lint

      - name: Build frontend
        working-directory: Frontend
        run: npm run build

      - name: Compile analytics Python
        run: python -m compileall Analytics

      - name: Run lightweight analytics contract tests
        run: python -m unittest discover -s Analytics/tests
